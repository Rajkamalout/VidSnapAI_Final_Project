{% extends "base.html" %} {% block title %}Register - VidSnapAI{% endblock %} {%
block content %}
<div
  class="container d-flex justify-content-center align-items-center"
  style="min-height: 90vh"
>
  <div
    class="card shadow-lg border-0 p-4"
    style="max-width: 420px; width: 100%; border-radius: 16px"
  >
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">Create Account</h2>
      <p class="text-muted mb-0">Join VidSnapAI today</p>
    </div>

    <!-- Error message -->
    <div id="errorMsg" class="alert alert-danger d-none"></div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="regName" placeholder="Name" />
      <label for="regName">Full Name</label>
    </div>

    <div class="form-floating mb-3">
      <input
        type="email"
        class="form-control"
        id="regEmail"
        placeholder="Email"
      />
      <label for="regEmail">Email address</label>
    </div>

    <div class="form-floating mb-4">
      <input
        type="password"
        class="form-control"
        id="regPassword"
        placeholder="Password"
      />
      <label for="regPassword">Password</label>
    </div>

    <button
      class="btn btn-primary w-100 py-2 fw-semibold"
      onclick="validateRegister()"
    >
      Register
    </button>

    <p class="text-center mt-3 mb-0">
      Already have an account?
      <a href="/login" class="text-decoration-none fw-semibold">Login</a>
    </p>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  function validateRegister() {
    const name = document.getElementById("regName").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value.trim();
    const errorBox = document.getElementById("errorMsg");

    // Reset
    errorBox.classList.add("d-none");
    errorBox.innerText = "";

    // Name validation
    if (name.length < 3) {
      showError("Name must be at least 3 characters long");
      return;
    }

    // Email validation
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
      showError("Please enter a valid email address");
      return;
    }

    // Password validation
    if (password.length < 6) {
      showError("Password must be at least 6 characters long");
      return;
    }

    // ✅ If all validations pass
    register(); // existing function in auth.js
  }

  function showError(msg) {
    const errorBox = document.getElementById("errorMsg");
    errorBox.innerText = msg;
    errorBox.classList.remove("d-none");
  }
</script>

<script src="{{ url_for('static', filename='auth.js') }}"></script>
{% endblock %}
